name: Build and Push to ACR

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: custom-nginx-app

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          FULL_IMAGE_NAME=${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:$IMAGE_TAG
          
          docker build -t $FULL_IMAGE_NAME .
          docker push $FULL_IMAGE_NAME

      - name: Checkout GitOps Config Repo
        uses: actions/checkout@v4
        with:
          repository: PROTIKPATRA/gitops-cluster-config
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: config-repo

      - name: Update Kubernetes Manifest
        run: |
          cd config-repo
          # Replace the old image with the brand new one from ACR
          sed -i "s|image: .*|image: ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:${{ github.sha }}|g" deployment.yaml
          
          git config user.name "GitHub Actions CI"
          git config user.email "actions@github.com"
          git add deployment.yaml
          git commit -m "Automated image update to tag ${{ github.sha }}"
          git push